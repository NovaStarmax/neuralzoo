services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_BASE_URL=http://api:8000
    networks:
      - neuralzoo-net

  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    networks:
      - neuralzoo-net

networks:
  neuralzoo-net:
    driver: bridge
