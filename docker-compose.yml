services:
  neuralzoo-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    expose:
      - "8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - neuralzoo-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  neuralzoo-front:
    build:
      context: .
      dockerfile: front/Dockerfile
    expose:
      - "8501"
    environment:
      API_BASE_URL: http://neuralzoo-api:8000
    depends_on:
      neuralzoo-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - neuralzoo-net

networks:
  neuralzoo-net:
    driver: bridge
